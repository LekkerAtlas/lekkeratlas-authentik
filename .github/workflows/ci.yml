name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AUTHENTIK_TAG: 2026.5.3
  TESTED_IMAGE: lekkeratlas-authentik:2026.5.3

  # CI-only Authentik config
  PG_DB: authentik
  PG_USER: authentik
  PG_PASS: authentik
  AUTHENTIK_SECRET_KEY: ci-only-secret-key-change-me
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"

  # CI-only blueprint variables
  AUTHENTIK_LEKKERATLAS_FQDN: http://localhost:3000
  AUTHENTIK_LEKKERATLAS_REDIRECT_URI: http://localhost:3000
  AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN: http://host.docker.internal:3000/webhooks/authentik
  AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN: ci-only-token
  AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET: ci-only-client-secret
  AUTHENTIK_RABBITMQ_CLIENT_SECRET: ci-only-rabbitmq-secret

  # Compose ports
  COMPOSE_PORT_HTTP: "9000"
  COMPOSE_PORT_HTTPS: "9443"

  # Blueprint development behavior
  AUTHENTIK_BLUEPRINT_APPLY_ENABLED: "true"
  AUTHENTIK_BLUEPRINT_APPLY_REQUIRED: "true"
  AUTHENTIK_BLUEPRINT_APPLY_ATTEMPTS: "5"
  AUTHENTIK_BLUEPRINT_APPLY_SLEEP_SECONDS: "5"
  AUTHENTIK_WORKER_RESTART_POLICY: "no"

jobs:
  test:
    name: Test image and blueprints
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create CI .env file
        run: |
          cat > .env <<EOF
          AUTHENTIK_TAG=${AUTHENTIK_TAG}

          PG_DB=${PG_DB}
          PG_USER=${PG_USER}
          PG_PASS=${PG_PASS}

          AUTHENTIK_SECRET_KEY=${AUTHENTIK_SECRET_KEY}
          AUTHENTIK_ERROR_REPORTING__ENABLED=${AUTHENTIK_ERROR_REPORTING__ENABLED}

          AUTHENTIK_LEKKERATLAS_FQDN=${AUTHENTIK_LEKKERATLAS_FQDN}
          AUTHENTIK_LEKKERATLAS_REDIRECT_URI=${AUTHENTIK_LEKKERATLAS_REDIRECT_URI}
          AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN=${AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN}
          AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN=${AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN}
          AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET=${AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET}
          AUTHENTIK_RABBITMQ_CLIENT_SECRET=${AUTHENTIK_RABBITMQ_CLIENT_SECRET}

          COMPOSE_PORT_HTTP=${COMPOSE_PORT_HTTP}
          COMPOSE_PORT_HTTPS=${COMPOSE_PORT_HTTPS}

          AUTHENTIK_BLUEPRINT_APPLY_ENABLED=${AUTHENTIK_BLUEPRINT_APPLY_ENABLED}
          AUTHENTIK_BLUEPRINT_APPLY_REQUIRED=${AUTHENTIK_BLUEPRINT_APPLY_REQUIRED}
          AUTHENTIK_BLUEPRINT_APPLY_ATTEMPTS=${AUTHENTIK_BLUEPRINT_APPLY_ATTEMPTS}
          AUTHENTIK_BLUEPRINT_APPLY_SLEEP_SECONDS=${AUTHENTIK_BLUEPRINT_APPLY_SLEEP_SECONDS}
          AUTHENTIK_WORKER_RESTART_POLICY=${AUTHENTIK_WORKER_RESTART_POLICY}
          EOF

      - name: Build and start Authentik stack
        run: |
          docker compose -f docker-compose.yml up -d --build

      - name: Wait for worker readiness
        run: |
          deadline=$((SECONDS + 300))

          while true; do
            worker_id="$(docker compose -f docker-compose.yml ps -q worker || true)"

            if [ -z "$worker_id" ]; then
              echo "Worker container does not exist."
              docker compose -f docker-compose.yml ps -a
              docker compose -f docker-compose.yml logs --no-color --tail=300 worker
              exit 1
            fi

            worker_status="$(docker inspect -f "{{.State.Status}}" "$worker_id")"
            worker_exit_code="$(docker inspect -f "{{.State.ExitCode}}" "$worker_id")"

            case "$worker_status" in
              exited|dead)
                echo "Worker hard-failed before becoming ready. Exit code: $worker_exit_code"
                echo
                docker compose -f docker-compose.yml ps -a
                echo
                docker compose -f docker-compose.yml logs --no-color --tail=300 worker
                exit "$worker_exit_code"
                ;;

              restarting)
                echo "Worker is restarting, which should not happen in CI."
                echo
                docker compose -f docker-compose.yml ps -a
                echo
                docker compose -f docker-compose.yml logs --no-color --tail=300 worker
                exit 1
                ;;
            esac

            if docker compose -f docker-compose.yml exec -T worker test -f /tmp/lekkeratlas/blueprints-ready; then
              echo "Worker is ready and blueprints were applied successfully."
              exit 0
            fi

            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "Timed out waiting for blueprint application."
              docker compose -f docker-compose.yml ps -a
              echo
              docker compose -f docker-compose.yml logs --no-color --tail=300 worker
              exit 1
            fi

            echo "Worker is running, but blueprint application has not completed yet."
            docker compose -f docker-compose.yml ps -a
            echo
            docker compose -f docker-compose.yml logs --no-color --tail=120 worker
            sleep 5
          done

      - name: Save tested Docker image
        if: github.event_name == 'pull_request'
        run: |
          mkdir -p out
          docker save "${TESTED_IMAGE}" > out/authentik-image.tar

      - name: Upload tested Docker image artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: authentik-image-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          path: out/authentik-image.tar
          retention-days: 7

      - name: Dump logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.yml ps
          docker compose -f docker-compose.yml logs --no-color --tail=300

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.yml down -v
