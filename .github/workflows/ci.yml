name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AUTHENTIK_TAG: 2026.2.4
  LOCAL_IMAGE: lekkeratlas-authentik:ci

  # CI-only Authentik config
  PG_DB: authentik
  PG_USER: authentik
  PG_PASS: authentik
  AUTHENTIK_SECRET_KEY: ci-only-secret-key-change-me
  AUTHENTIK_ERROR_REPORTING__ENABLED: "false"

  # CI-only blueprint variables
  AUTHENTIK_LEKKERATLAS_FQDN: http://localhost:3000
  AUTHENTIK_LEKKERATLAS_REDIRECT_URI: http://localhost:3000
  AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN: http://host.docker.internal:3000/webhooks/authentik
  AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN: ci-only-token
  AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET: ci-only-client-secret
  AUTHENTIK_RABBITMQ_CLIENT_SECRET: ci-only-rabbitmq-secret

jobs:
  test:
    name: Test image and blueprints
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build custom Authentik image
        run: |
          docker build \
            --build-arg AUTHENTIK_TAG="${AUTHENTIK_TAG}" \
            --tag "${LOCAL_IMAGE}" \
            --file container/authentik/Dockerfile \
            .

      - name: Create CI compose file
        run: |
          cat > docker-compose.ci.yml <<'YAML'
          services:
            postgresql:
              image: docker.io/library/postgres:16-alpine
              environment:
                POSTGRES_DB: ${PG_DB}
                POSTGRES_USER: ${PG_USER}
                POSTGRES_PASSWORD: ${PG_PASS}
                PGDATA: /var/lib/postgresql/data/pgdata
              healthcheck:
                test:
                  - CMD-SHELL
                  - pg_isready -d "$${POSTGRES_DB}" -U "$${POSTGRES_USER}"
                start_period: 20s
                interval: 5s
                retries: 20
                timeout: 5s
              volumes:
                - database:/var/lib/postgresql/data

            server:
              image: ${LOCAL_IMAGE}
              pull_policy: never
              command: server
              depends_on:
                postgresql:
                  condition: service_healthy
              environment:
                AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
                AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
                AUTHENTIK_POSTGRESQL__HOST: postgresql
                AUTHENTIK_POSTGRESQL__NAME: ${PG_DB}
                AUTHENTIK_POSTGRESQL__USER: ${PG_USER}
                AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}

                AUTHENTIK_LEKKERATLAS_FQDN: ${AUTHENTIK_LEKKERATLAS_FQDN}
                AUTHENTIK_LEKKERATLAS_REDIRECT_URI: ${AUTHENTIK_LEKKERATLAS_REDIRECT_URI}
                AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN: ${AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN}
                AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN: ${AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN}
                AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET: ${AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET}
                AUTHENTIK_RABBITMQ_CLIENT_SECRET: ${AUTHENTIK_RABBITMQ_CLIENT_SECRET}
              ports:
                - "9000:9000"
              volumes:
                - authentik_data:/data

            worker:
              image: ${LOCAL_IMAGE}
              pull_policy: never
              command: worker
              depends_on:
                postgresql:
                  condition: service_healthy
                server:
                  condition: service_started
              environment:
                AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
                AUTHENTIK_ERROR_REPORTING__ENABLED: ${AUTHENTIK_ERROR_REPORTING__ENABLED}
                AUTHENTIK_POSTGRESQL__HOST: postgresql
                AUTHENTIK_POSTGRESQL__NAME: ${PG_DB}
                AUTHENTIK_POSTGRESQL__USER: ${PG_USER}
                AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}

                AUTHENTIK_LEKKERATLAS_FQDN: ${AUTHENTIK_LEKKERATLAS_FQDN}
                AUTHENTIK_LEKKERATLAS_REDIRECT_URI: ${AUTHENTIK_LEKKERATLAS_REDIRECT_URI}
                AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN: ${AUTHENTIK_LEKKERATLAS_WEBHOOK_FQDN}
                AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN: ${AUTHENTIK_WEBHOOK_SYNC_LEKKERATLAS_DB_BEARER_TOKEN}
                AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET: ${AUTHENTIK_PROVIDER_FOR_LEKKERATLAS_CLIENT_SECRET}
                AUTHENTIK_RABBITMQ_CLIENT_SECRET: ${AUTHENTIK_RABBITMQ_CLIENT_SECRET}
              volumes:
                - authentik_data:/data

          volumes:
            database:
            authentik_data:
          YAML

      - name: Start Authentik stack
        run: |
          docker compose -f docker-compose.ci.yml up -d

      - name: Wait for server readiness
        run: |
          timeout 240 bash -c '
            until curl -fsS http://localhost:9000/-/health/ready/ &> /dev/null; do
              docker compose -f docker-compose.ci.yml ps
              sleep 5
            done
          '

      - name: Wait for worker readiness
        run: |
          timeout 240 bash -c '
            until docker compose -f docker-compose.ci.yml exec -T worker ak healthcheck; do
              echo "Worker is not healthy yet. Current container state:"
              docker compose -f docker-compose.ci.yml ps
              echo
              echo "Recent worker logs:"
              docker compose -f docker-compose.ci.yml logs --no-color --tail=80 worker
              sleep 5
            done
          '

      - name: Wait for successful blueprints
        env:
          AUTHENTIK_BLUEPRINT_TIMEOUT_SECONDS: 240
          AUTHENTIK_BLUEPRINT_POLL_SECONDS: 5
        run: |
          bash scripts/ci/wait_for_authentik_blueprints.sh docker-compose.ci.yml worker

      - name: Check expected Authentik objects
        run: |
          docker compose -f docker-compose.ci.yml exec -T worker ak shell -c "
          from authentik.core.models import Application
          from authentik.brands.models import Brand
          from authentik.flows.models import Flow

          app = Application.objects.get(slug='lekker-atlas')
          flow = Flow.objects.get(slug='lekkeratlas-authentication-flow')
          brand = Brand.objects.get(domain='authentik-default')

          assert app.provider is not None, 'LekkerAtlas application has no provider'
          assert brand.flow_authentication_id == flow.pk, 'Brand does not point to LekkerAtlas authentication flow'

          print('Application:', app.slug, app.provider)
          print('Flow:', flow.slug)
          print('Brand:', brand.domain, brand.flow_authentication)
          "

      - name: Save tested Docker image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p out
          docker save "${LOCAL_IMAGE}" > out/authentik-image.tar

      - name: Upload tested Docker image artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: authentik-image-${{ github.sha }}
          path: out/authentik-image.tar
          retention-days: 7

      - name: Show logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.ci.yml logs --no-color

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.ci.yml down -v
