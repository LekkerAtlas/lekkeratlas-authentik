name: Publish experimental image

on:
  pull_request:
    branches:
      - main
    types:
      - closed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lekkeratlas-authentik
  LOCAL_IMAGE: lekkeratlas-authentik:ci

jobs:
  publish:
    name: Publish experimental
    runs-on: ubuntu-latest

    if: github.event.pull_request.merged == true

    permissions:
      contents: read
      actions: read
      packages: write

    steps:
      - name: Find successful PR CI run
        id: ci-run
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          run_id="$(
            gh run list \
              --repo "$GH_REPO" \
              --workflow "CI" \
              --event pull_request \
              --commit "$HEAD_SHA" \
              --status success \
              --json databaseId \
              --jq '.[0].databaseId'
          )"

          if [ -z "$run_id" ] || [ "$run_id" = "null" ]; then
            echo "No successful CI run found for PR #${PR_NUMBER} at ${HEAD_SHA}" >&2
            exit 1
          fi

          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download tested image artifact
        uses: actions/download-artifact@v5
        with:
          name: authentik-image-pr-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
          run-id: ${{ steps.ci-run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out

      - name: Load tested Docker image
        run: |
          docker load --input out/authentik-image.tar
          docker image inspect "${LOCAL_IMAGE}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push experimental tag
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"

          docker tag "${LOCAL_IMAGE}" "${image}:experimental"
          docker push "${image}:experimental"
