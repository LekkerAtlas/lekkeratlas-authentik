name: Publish experimental image

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lekkeratlas-authentik
  LOCAL_IMAGE: lekkeratlas-authentik:ci

jobs:
  publish:
    name: Publish experimental
    runs-on: ubuntu-latest

    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    permissions:
      contents: read
      actions: read
      packages: write

    steps:
      - name: Download tested image artifact
        uses: actions/download-artifact@v5
        with:
          name: authentik-image-${{ github.event.workflow_run.head_sha }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: out

      - name: Load tested Docker image
        run: |
          docker load --input out/authentik-image.tar
          docker image inspect "${LOCAL_IMAGE}"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push experimental tag
        run: |
          image="${REGISTRY}/${IMAGE_NAME}"

          docker tag "${LOCAL_IMAGE}" "${image}:experimental"
          docker push "${image}:experimental"
